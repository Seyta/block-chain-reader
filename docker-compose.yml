services:

  app:
    build:
      context: .
      dockerfile: Docker/app/Dockerfile
    container_name: btc-reader-app
    volumes:
      - ./app:/app
    #env_file:
    #  - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      btc-reader:
        ipv4_address: 172.20.0.11
    restart: no

  db:
    image: postgres:16-alpine
    container_name: btc-reader-db
    environment:
      POSTGRES_DB: ${DB_NAME:-btc_reader}
      POSTGRES_USER: ${DB_USER:-btc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./Docker/db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-btc_user} -d ${DB_NAME:-btc_reader}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      btc-reader:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

networks:
  btc-reader:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  db_data:
